# Selene standard library definition for busted globals.
# Referenced by tests/selene.toml as standard_library = "lua51+busted".
globals:
  describe:
    args:
      - type: string
      - type: function
  it:
    args:
      - type: string
      - type: function
  before_each:
    args:
      - type: function
  after_each:
    args:
      - type: function
  pending:
    args:
      - type: string
  assert:
    property: true
  spy:
    property: true
  stub:
    property: true
  mock:
    property: true
